<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/logoLcolor.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magia del Poas V2</title>
    <!-- GitHub Pages SPA redirect (rafgraph/spa-github-pages) -->
    <script type="text/javascript">
      ;(function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&")
            })
            .join("?")
          var basePath = l.pathname.endsWith("/") ? l.pathname.slice(0, -1) : l.pathname
          window.history.replaceState(null, null, basePath + decoded + l.hash)
        }
      })(window.location)
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
    />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
